<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper Replay Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1 class="title">💣 Replay Generator</h1>

    <div id="status-section" class="section">
      <div class="status-row">
        <span class="label">Status:</span>
        <span id="status-text" class="status idle">Idle</span>
      </div>
      <div class="status-row">
        <span class="label">Games:</span>
        <span id="game-count">0</span>
      </div>
      <div class="status-row">
        <span class="label">Events:</span>
        <span id="event-count">0</span>
      </div>
      <div class="status-row">
        <span class="label">Time:</span>
        <span id="elapsed-time">0.000s</span>
      </div>
    </div>

    <div id="controls-section" class="section">
      <button id="btn-start" class="btn btn-primary" title="Start recording">
        ⏺ Start Recording
      </button>
      <button id="btn-stop" class="btn btn-danger" disabled title="Stop recording">
        ⏹ Stop
      </button>
      <button id="btn-download" class="btn btn-success" disabled title="Download .rawvf file">
        💾 Download .rawvf
      </button>
    </div>

    <div id="settings-section" class="section">
      <details>
        <summary>Settings</summary>
        <div class="setting-row">
          <label for="player-name">Player name:</label>
          <input type="text" id="player-name" placeholder="Anonymous" />
        </div>
      </details>
    </div>

    <div id="info-section" class="section info">
      <p>Navigate to a minesweeper website, then click <strong>Start Recording</strong>. Games will be recorded automatically. Click <strong>Stop</strong> when done, then download your replays.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
