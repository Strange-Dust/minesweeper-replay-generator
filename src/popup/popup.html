<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper Replay Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1 class="title">💣 Replay Generator</h1>

    <!-- Recording controls -->
    <div id="recording-section" class="section">
      <div class="recording-header">
        <span id="status-text" class="status idle">Idle</span>
        <span id="live-stats" class="live-stats"></span>
      </div>
      <div class="recording-buttons">
        <button id="btn-start" class="btn btn-primary" title="Start recording">
          ⏺ Record
        </button>
        <button id="btn-stop" class="btn btn-danger" disabled title="Stop recording">
          ⏹ Stop
        </button>
      </div>
    </div>

    <!-- Game history -->
    <div id="history-section" class="section">
      <div class="history-header">
        <label class="select-all-label" title="Select all">
          <input type="checkbox" id="select-all" />
          <span>Saved Replays</span>
        </label>
        <span id="storage-info" class="storage-info"></span>
      </div>
      <div id="game-list" class="game-list">
        <div class="empty-state">No recorded games yet</div>
      </div>
      <div class="history-actions">
        <button id="btn-download" class="btn btn-sm btn-success" disabled
          title="Download selected replays">
          💾 Download
        </button>
        <button id="btn-delete" class="btn btn-sm btn-outline-danger" disabled
          title="Delete selected replays">
          🗑 Delete
        </button>
        <button id="btn-clear-all" class="btn btn-sm btn-outline-danger" disabled
          title="Delete all replays">
          🧹 Clear All
        </button>
      </div>
    </div>

    <!-- Settings -->
    <div id="settings-section" class="section">
      <details>
        <summary><span id="settings-summary">⚠️ Settings</span></summary>
        <div class="setting-row">
          <label for="player-name">Player name:</label>
          <input type="text" id="player-name" placeholder="Anonymous" />
        </div>

        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="wins-only" />
            <span>Only save wins</span>
          </label>
        </div>

        <div class="setting-divider"></div>

        <div class="settings-status" id="settings-status">
          <span class="settings-status-text" id="settings-status-text">
            Not detected — visit the game's settings page to auto-detect
          </span>
        </div>

        <div class="setting-row">
          <label>Chording mode:</label>
          <div class="setting-value" id="chording-display">—</div>
        </div>

        <div class="setting-row">
          <label>Keyboard-as-mouse:</label>
          <div class="setting-value" id="keyboard-display">—</div>
        </div>

        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="manual-override" />
            <span>Manual override</span>
          </label>
        </div>

        <div id="manual-settings" class="manual-settings hidden">
          <div class="setting-row">
            <label for="chording-select">Chording:</label>
            <select id="chording-select">
              <option value="both">Left+Right click (Both)</option>
              <option value="superclick">Left click only (SuperClick)</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
          <div class="setting-row">
            <label class="checkbox-label">
              <input type="checkbox" id="keyboard-enabled" />
              <span>Keyboard-as-mouse enabled</span>
            </label>
          </div>
          <div class="setting-row keyboard-keys hidden" id="keyboard-keys">
            <div class="key-row">
              <label for="left-key">Left click key:</label>
              <select id="left-key"></select>
            </div>
            <div class="key-row">
              <label for="right-key">Right click key:</label>
              <select id="right-key"></select>
            </div>
          </div>
        </div>
      </details>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
